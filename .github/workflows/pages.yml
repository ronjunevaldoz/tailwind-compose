name: Deploy showcase to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time -- cancel an in-flight one rather than queue,
# so Pages always reflects the latest push to main.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build wasmJs showcase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      # Production/optimized build -- the same task verified locally to render the full
      # showcase (sidebar, TopBar, dark-mode toggle, breadcrumb, cards) in a real browser.
      - name: Build wasmJs production distribution
        run: ./gradlew :showcase:shared:wasmJsBrowserDistribution

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: showcase/shared/build/dist/wasmJs/productionExecutable

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
