build:
  maxIssues: 0

complexity:
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 8
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  # The tailwind-{layout,color,typography,effects} modules are code-generated
  # utility-scale functions (spacing, sizing, color, typography, border extensions)
  # — hundreds of one-line functions per file by design, not a code smell. Excluded
  # from the function-count check entirely.
  TooManyFunctions:
    active: true
    excludes:
      - '**/tailwind-layout/**'
      - '**/tailwind-color/**'
      - '**/tailwind-typography/**'
      - '**/tailwind-effects/**'

naming:
  FunctionNaming:
    active: true
    excludes: ['**/test/**', '**/*Test.kt', '**/*Preview*', '**/build/**']
    ignoreAnnotated: ['Composable', 'Preview']

style:
  # tailwind-{layout,color,typography,effects}/tailwind-core are literally tables of
  # Tailwind's own numeric scale values (spacing dp, opacity %, aspect ratios, OKLCH
  # components) — the numbers ARE the content, not magic constants standing in for meaning.
  MagicNumber:
    active: true
    excludes:
      - '**/tailwind-layout/**'
      - '**/tailwind-color/**'
      - '**/tailwind-typography/**'
      - '**/tailwind-effects/**'
      - '**/tailwind-core/**'
      - '**/build/**'
  # @Preview-annotated composables are invoked by Android Studio/preview tooling,
  # not by our own code, so Detekt can't see the call site.
  UnusedPrivateMember:
    active: true
    ignoreAnnotated: ['Preview']
  MaxLineLength:
    active: true
    excludes: ['**/build/**']
