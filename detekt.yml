build:
  maxIssues: 0

complexity:
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 8
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  # tailwind-modifiers is code-generated utility-scale functions (spacing, sizing,
  # color, typography, border extensions) — hundreds of one-line functions per file
  # by design, not a code smell. Excluded from the function-count check entirely.
  TooManyFunctions:
    active: true
    excludes: ['**/tailwind-modifiers/**']

naming:
  FunctionNaming:
    active: true
    excludes: ['**/test/**', '**/*Test.kt', '**/*Preview*']
    ignoreAnnotated: ['Composable', 'Preview']
